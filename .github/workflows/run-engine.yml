name: Prime League Analytics Engine

on:
  schedule:
    # Adjusted for UTC -> CEST/CET conversion. Peak polling from 16:00-22:00 CEST (14:00-20:00 UTC)
    - cron: '*/15 14-20 * * *'
    - cron: '0 0-13,21-23 * * *'
  workflow_dispatch: 

permissions:
  contents: write

# Prevents overlapping runs from causing Git conflicts if a run gets stuck
concurrency:
  group: engine-execution
  cancel-in-progress: false

jobs:
  run-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Grab the latest code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: npm install 

      - name: Execute the Orchestrator
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          PRIME_API_URL: ${{ secrets.PRIME_API_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CH_LP: ${{ secrets.DISCORD_CH_LP }}
          DISCORD_CH_LEADERBOARD: ${{ secrets.DISCORD_CH_LEADERBOARD }}
          DISCORD_CH_OVERVIEW: ${{ secrets.DISCORD_CH_OVERVIEW }}
        run: node src/index.js

      - name: Save Data to Backend Repository
        if: success() 
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Ledger, State & PUUID Database"
          file_pattern: "data/*.json"
          skip_dirty_check: false 

# --- THE BRIDGE TO THE FRONTEND REPO (REPO B) ---
      - name: Push Ledger to Frontend Repository (Repo B)
        if: success()
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.REPO_B_PAT }}
        with:
          source_file: 'data' # <--- Removed the slash
          destination_repo: 'UICMaster/UIC_ANALYSIS_FRONTEND'
          destination_folder: '/' 
          user_email: 'bot@ultrainstinctcrew.com'
          user_name: 'UIC Data Engine'
          commit_message: '🤖 Automated HUD Data Sync from Backend'
          
      - name: 🕵️ Test Secret Mapping
        env:
          TEST_KEY: ${{ secrets.RIOT_API_KEY }}
        run: |
          if [ -z "$TEST_KEY" ]; then
            echo "❌ THE SECRET IS EMPTY. GITHUB ACTIONS CANNOT SEE IT."
            exit 1
          else
            echo "✅ THE SECRET EXISTS IN GITHUB ACTIONS!"
          fi
