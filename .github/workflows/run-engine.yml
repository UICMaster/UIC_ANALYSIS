name: Prime League Analytics Engine

on:
  schedule:
    # Runs exactly once an hour, every hour (UTC), keeping your execution footprint completely clean.
    - cron: '0 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

# Prevents overlapping runs from causing Git conflicts if a run gets stuck
concurrency:
  group: engine-execution
  cancel-in-progress: false

jobs:
  run-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Grab the latest code
        uses: actions/checkout@v4
        with:
          # Fetches full history so git-auto-commit can seamlessly track files
          fetch-depth: 0 

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: npm install 

      - name: Execute the Orchestrator
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          PRIME_API_URL: ${{ secrets.PRIME_API_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_CH_LP: ${{ secrets.DISCORD_CH_LP }}
          DISCORD_CH_LEADERBOARD: ${{ secrets.DISCORD_CH_LEADERBOARD }}
          DISCORD_CH_OVERVIEW: ${{ secrets.DISCORD_CH_OVERVIEW }}
        run: node src/index.js

      - name: Update Source
        if: success() 
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Ledger, State & PUUID Database"
          file_pattern: "data/*.json"
          skip_dirty_check: false 
          push_options: '--force' # Force pushes to cleanly resolve any concurrent Git state updates

      - name: Export Job Analyse Frontend
        if: success()
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.REPO_B_PAT }}
        with:
          source_file: 'data'
          destination_repo: 'UICMaster/UIC_ANALYSIS_FRONTEND'
          destination_folder: '/' 
          user_email: 'bot@ultrainstinctcrew.com'
          user_name: 'UIC Data Engine'
          commit_message: '🤖 Automated HUD Data Sync from Backend'
