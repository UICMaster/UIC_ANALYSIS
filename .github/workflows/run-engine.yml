name: UIC Analytics Engine V2

on:
  schedule:
    - cron: '*/15 14-20 * * *'
    - cron: '0 0-13,21-23 * * *'
  workflow_dispatch: 

permissions:
  contents: write

concurrency:
  group: engine-execution
  cancel-in-progress: false

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Grab code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install 

      - name: Execute
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          PRIME_API_URL: ${{ secrets.PRIME_API_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_CH_LP: ${{ secrets.DISCORD_CH_LP }}
          DISCORD_CH_POWER_RANKINGS: ${{ secrets.DISCORD_CH_POWER_RANKINGS }}
          DISCORD_CH_RESULTS: ${{ secrets.DISCORD_CH_RESULTS }}
          DISCORD_CH_OVERVIEW: ${{ secrets.DISCORD_CH_OVERVIEW }}
        run: node src/index.js

      - name: Save State
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 [Engine] Sync Match Records & State"

      - name: Sync to Website
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.REPO_B_PAT }}
        with:
          source_file: 'data/matches/'
          destination_repo: 'UICMaster/UIC_WEBSITE'
          destination_folder: 'src/data/matches' 
          user_email: 'bot@ultrainstinctcrew.com'
          user_name: 'UIC Data Engine'
          commit_message: '🤖 Automated Prime Match Sync'
