name: Prime League Analytics Engine

on:
  schedule:
    - cron: '*/15 16-22 * * *'
    - cron: '0 0-15,23 * * *'
  workflow_dispatch: 

# We must give the action permission to write code back to your repository
permissions:
  contents: write

jobs:
  run-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Grab the latest code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: npm install # (Or just ignore this step if you have no package.json yet)

      - name: Execute the Orchestrator
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          PRIME_API_URL: ${{ secrets.PRIME_API_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_CH_LP: ${{ secrets.DISCORD_CH_LP }}
          DISCORD_CH_CARRY: ${{ secrets.DISCORD_CH_CARRY }}
          DISCORD_CH_TACTICIAN: ${{ secrets.DISCORD_CH_TACTICIAN }}
        run: node src/index.js

      - name: Save Data to Repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Ledger & PUUID Database"
          file_pattern: "data/*.json"
